<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <h1>Simon Game</h1>

        <p class="subtitle">
            Watch the pattern and repeat it!<br>
           (It Build your memory & concentration skills)
        </p>

        <h2 id="level-title">Press Any Key to Start</h2>

        <div class="game-board">

            <div class="btn purple" id="purple"></div>
            <div class="btn red" id="red"></div>

            <div class="btn yellow" id="yellow"></div>
            <div class="btn blue" id="blue"></div>

        </div>

        <button class="start-btn">Start Game</button>

    </div>
<script src="app.js"></script>
</body>
</html>
